events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        
        # Allow certbot ACME challenge through HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server block ────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _; # Change this manually or let the setup script handle it

        # SSL — mapped from host Let's Encrypt directory
        # The exact paths depend on your domain. The setup script will need to 
        # modify this config or we assume a wildcard/specific cert path.
        # This is a generic config assuming the setup script configures SSL on the host
        # and we just mount /etc/letsencrypt.
        
        # A safer approach for dockerized nginx is using an entrypoint script
        # or replacing 'YOUR_DOMAIN' via sed in the setup script.
        
        # Let's use placeholders that the setup script will replace:
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

        # ── Proxy to FastAPI backend ──────────────────────────────────────────────
        location / {
            # 'backend' is the service name in docker-compose.yml
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
            
            client_max_body_size 50M;
        }
    }
}
